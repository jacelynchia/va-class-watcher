name: VA class watcher

# Runs the watcher 24/7 without your laptop. Each run polls for ~3h50m, then
# the schedule starts the next one. The short gap between runs is when command
# replies and spot checks can be briefly delayed. Each run self-terminates well
# before the 4-hour mark so runs do not overlap.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

# Needed so the bot can save your live watchlist to state.json in this repo.
permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 238
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the watcher
        env:
          VA_USERNAME: ${{ secrets.VA_USERNAME }}
          VA_PASSWORD: ${{ secrets.VA_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python va_watcher.py
